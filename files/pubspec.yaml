name: pathforge
description: AI-powered career roadmap app for engineering students
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^13.0.0

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.4

  # Firebase
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.0
  cloud_firestore: ^4.15.0

  # AI / API
  http: ^1.2.0

  # Voice Input
  speech_to_text: ^6.6.0

  # UI & Animations
  animate_do: ^3.3.4
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  shimmer: ^3.0.0

  # Utilities
  shared_preferences: ^2.2.2
  url_launcher: ^6.2.5
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1
  percent_indicator: ^4.2.3
  iconsax: ^0.0.8

  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/data/
